contracts.root=../contracts
app.ui.enabled=${APP_UI_ENABLED:true}
app.security.enabled=${APP_SECURITY_ENABLED:false}
app.security.username=${APP_SECURITY_USERNAME:admin}
app.security.password=${APP_SECURITY_PASSWORD:change-me}
checks.db.path=${CHECKS_DB_PATH:../checks.db}
checks.db.url=${CHECKS_DB_URL:}
checks.db.username=${CHECKS_DB_USERNAME:}
checks.db.password=${CHECKS_DB_PASSWORD:}
checks.db.username-env=${CHECKS_DB_USERNAME_ENV:}
checks.db.password-env=${CHECKS_DB_PASSWORD_ENV:}
checks.db.fail-fast-startup=${CHECKS_DB_FAIL_FAST_STARTUP:false}
checks.db.enforce-secure-postgres=${CHECKS_DB_ENFORCE_SECURE_POSTGRES:false}
checks.db.query-timeout=${CHECKS_DB_QUERY_TIMEOUT:5s}
checks.db.pool.minimum-idle=${CHECKS_DB_POOL_MIN_IDLE:1}
checks.db.pool.maximum-size=${CHECKS_DB_POOL_MAX_SIZE:10}
checks.db.pool.connection-timeout=${CHECKS_DB_POOL_CONNECTION_TIMEOUT:1s}
checks.db.pool.idle-timeout=${CHECKS_DB_POOL_IDLE_TIMEOUT:2m}
checks.db.pool.max-lifetime=${CHECKS_DB_POOL_MAX_LIFETIME:30m}
checks.db.pool.validation-timeout=${CHECKS_DB_POOL_VALIDATION_TIMEOUT:3s}
checks.db.pool.initialization-fail-timeout=${CHECKS_DB_POOL_INIT_FAIL_TIMEOUT:-1ms}
checks.db.ssl.enabled=${CHECKS_DB_SSL_ENABLED:false}
checks.db.ssl.mode=${CHECKS_DB_SSL_MODE:require}
checks.db.ssl.root-cert-path=${CHECKS_DB_SSL_ROOT_CERT:}
checks.db.ssl.cert-path=${CHECKS_DB_SSL_CERT:}
checks.db.ssl.key-path=${CHECKS_DB_SSL_KEY:}
checks.runner.enabled=${CHECKS_RUNNER_ENABLED:true}
checks.runner.poll-interval=${CHECKS_RUNNER_POLL_INTERVAL:5000}
checks.runner.max-per-poll=${CHECKS_RUNNER_MAX_PER_POLL:3}
checks.runner.max-retries=${CHECKS_RUNNER_MAX_RETRIES:2}
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,metrics}
management.endpoint.health.show-details=${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:always}
